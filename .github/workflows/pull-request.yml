name: Pull Request
on: pull_request
permissions:
  contents: read
defaults:
  run:
    shell: bash
concurrency:
  group: ${{github.workflow_ref}}
  cancel-in-progress: true
jobs:
  determine-releases:
    name: Determine Releases
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      releases: ${{steps.releases.outputs.releases}}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Determine releases
        id: releases
        run: |
          RELEASES=$(ls -d releases/*/ | xargs -n1 basename)
          echo "Releases: ${RELEASES//$'\n'/, }"
          RELEASES=$(echo "$RELEASES" | jq -Rnc '[inputs]')
          echo "releases=${RELEASES}" >> "${GITHUB_OUTPUT}"
  check-packages:
    name: Check Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    needs:
      - determine-releases
      - check-base-images
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{github.head_ref}}
      - name: Update packages
        run: |
          for RELEASE in $(echo "${RELEASES}" | jq -r '.[]'); do
            echo "::group::${RELEASE}"
            bash .github/scripts/update-packages.sh "releases/${RELEASE}"
            echo '::endgroup::'
          done
        env:
          RELEASES: ${{needs.determine-releases.outputs.releases}}
      - name: Gather info
        id: info
        run: |
          USER_NAME="github-actions[bot]"
          USER_ID=$(gh api "/users/${USER_NAME}" --jq '.id')
          USER_EMAIL="${USER_ID}+${USER_NAME}@users.noreply.github.com"
          echo "commit-author=${USER_NAME} <${USER_EMAIL}>" >> "${GITHUB_OUTPUT}"
          echo "title=Update packages for PR #${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
        env:
          GITHUB_TOKEN: ${{github.token}}
          PR_NUMBER: ${{github.event.pull_request.number}}
      - name: Push changes
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          token: ${{github.token}}
          commit-message: ${{steps.info.outputs.title}}
          author: ${{steps.info.outputs.commit-author}}
          committer: ${{steps.info.outputs.commit-author}}
          add-paths: releases/*/packages/generated/install.txt
          base: ${{github.event.pull_request.head.ref}}
          branch: auto/update-packages/pr-${{github.event.pull_request.number}}
          delete-branch: true
          draft: true
          title: ${{steps.info.outputs.title}}
          body: Automated package updates.
          labels: |
            dependencies
            auto
  check-base-images:
    name: Check Base Images
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: determine-releases
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Verify base images match releases
        run: |
          for RELEASE in $(echo "${RELEASES}" | jq -r '.[]'); do
            echo "::group::${RELEASE}"
            FROM_LINE=$(grep -E '^FROM ubuntu:' "releases/${RELEASE}/Dockerfile")
            IMAGE_TAG=${FROM_LINE#FROM ubuntu:}
            IMAGE_STREAM=${IMAGE_TAG%%-*}
            if [[ "${IMAGE_STREAM}" != "${RELEASE}" ]]; then
              echo "::error::Base image '${FROM_LINE}' does not match" \
                "release '${RELEASE}' (expected 'FROM ubuntu:${RELEASE}-...')"
              exit 1
            fi
            echo "Base image '${FROM_LINE}' matches release '${RELEASE}'"
            echo '::endgroup::'
          done
        env:
          RELEASES: ${{needs.determine-releases.outputs.releases}}
  check-formatting-all:
    name: Check Formatting (All)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Set up EditorConfig Checker
        uses: editorconfig-checker/action-editorconfig-checker@v2.1.0
      - name: Check formatting
        run: editorconfig-checker
  check-formatting-dockerfile:
    name: Check Formatting (Dockerfile)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Check formatting
        uses: hadolint/hadolint-action@v3.3.0
        with:
          recursive: true
  check-formatting-markdown:
    name: Check Formatting (Markdown)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Check formatting
        uses: davidanson/markdownlint-cli2-action@v22.0.0
        with:
          globs: '**/*.md'
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - determine-releases
      - check-base-images
      - check-packages
    strategy:
      fail-fast: false
      matrix:
        release: ${{fromJson(needs.determine-releases.outputs.releases)}}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Determine info
        id: info
        run: |
          RELEASE_DIR="releases/${RELEASE}"
          PLATFORMS=$(paste -sd, "${RELEASE_DIR}/platforms.txt")
          TEMP_IMAGE='ci'
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT
          echo "ci-image-tag=$TEMP_IMAGE:${RELEASE}" >> $GITHUB_OUTPUT
          echo "ci-test-image-tag=$TEMP_IMAGE:${RELEASE}-test" >> $GITHUB_OUTPUT
          echo "release-dir=${RELEASE_DIR}" >> $GITHUB_OUTPUT
        env:
          RELEASE: ${{matrix.release}}
      - name: Set up Docker
        uses: docker/setup-docker-action@v5.0.0
        with:
          daemon-config: |
            { "features": { "containerd-snapshotter": true } }
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0
        with:
          platforms: ${{steps.info.outputs.platforms}}
      - name: Build image
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./${{steps.info.outputs.release-dir}}
          platforms: ${{steps.info.outputs.platforms}}
          tags: ${{steps.info.outputs.ci-image-tag}}
          cache-from: type=gha,scope=${{matrix.release}}
          cache-to: type=gha,scope=${{matrix.release}},mode=max
          load: true
      - name: Build test image
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./${{steps.info.outputs.release-dir}}/test
          build-contexts: |
            ci:image=docker-image://${{steps.info.outputs.ci-image-tag}}
          platforms: ${{steps.info.outputs.platforms}}
          tags: ${{steps.info.outputs.ci-test-image-tag}}
          cache-from: type=gha,scope=${{matrix.release}}-test
          cache-to: type=gha,scope=${{matrix.release}}-test,mode=max
          load: true
      - name: Run tests
        run: >
          for PLATFORM in ${PLATFORMS//,/ }; do
            echo "::group::Run test ($PLATFORM)"
            docker run --rm \
              --platform "$PLATFORM" \
              -e 'TZ=America/Toronto' \
              -e 'PUID=9999' -e 'PGID=9999' -e 'SGID=10000,10001' \
              "$TEST_IMAGE_TAG"
            echo '::endgroup::'
          done
        env:
          TEST_IMAGE_TAG: ${{steps.info.outputs.ci-test-image-tag}}
          PLATFORMS: ${{steps.info.outputs.platforms}}
      - name: Collect build details
        run: |
          # Determine the remote image tag to compare against
          echo "::group::Determine remote image tag"
          VERSION=$(grep -E '^FROM ubuntu:[a-z]+-[0-9]+$' releases/${RELEASE}/Dockerfile)
          VERSION=${VERSION##*:}
          STREAM=${VERSION%-*}
          REMOTE_IMAGE_TAG=$REMOTE_IMAGE:$STREAM
          echo "Local image:  $LOCAL_IMAGE_TAG"
          echo "Remote image: $REMOTE_IMAGE_TAG"
          echo "Platforms:    $PLATFORMS"
          if ! docker buildx imagetools inspect \
            $REMOTE_IMAGE_TAG > /dev/null 2>&1; then
            echo "::warning::Tag '$STREAM' not found, falling back to 'latest'"
            REMOTE_IMAGE_TAG=$REMOTE_IMAGE:latest
            echo "Remote image: $REMOTE_IMAGE_TAG"
          fi
          echo "::endgroup::"
          # Collect build data as JSON
          JSON=$(jq -n --arg release "$RELEASE" '{
            release: $release,
            have_remote: true,
            failed_platforms: [],
            total_size_new: 0,
            total_size_old: 0,
            platforms: []
          }')
          FMT='--to=iec --suffix=B --format=%.2f'
          for PLATFORM in ${PLATFORMS//,/ }; do
            echo "::group::$PLATFORM"
            PULL_FAILED=false
            # Local image size
            SIZE_NEW=$(docker image inspect --platform=$PLATFORM \
              -f '{{.Size}}' $LOCAL_IMAGE_TAG)
            echo "Local size: $SIZE_NEW ($(echo $SIZE_NEW | numfmt $FMT))"
            # Layer breakdown
            LAYERS=$(
              docker image history --platform=$PLATFORM \
                --format 'table | {{.Size}} | {{.CreatedBy}} |' $LOCAL_IMAGE_TAG
            )
            LAYERS=${LAYERS#*$'\n'}
            echo "Layer breakdown:"
            echo "$LAYERS"
            # Remote image size
            if docker pull --platform=$PLATFORM $REMOTE_IMAGE_TAG; then
              SIZE_OLD=$(
                docker image inspect --platform=$PLATFORM -f '{{.Size}}' \
                  $REMOTE_IMAGE_TAG
              )
              echo "Remote size: $SIZE_OLD ($(echo $SIZE_OLD | numfmt $FMT))"
            else
              PULL_FAILED=true
              SIZE_OLD=$SIZE_NEW
              echo "::warning::Failed to pull remote image for $PLATFORM," \
                "using local as baseline"
            fi
            # Add platform data to JSON
            JSON=$(echo "$JSON" | jq \
              --arg platform "$PLATFORM" \
              --argjson size_new "$SIZE_NEW" \
              --argjson size_old "$SIZE_OLD" \
              --argjson pull_failed "$PULL_FAILED" \
              --arg layers "$LAYERS" \
              '.platforms += [{
                name: $platform,
                size_new: $size_new,
                size_old: $size_old,
                pull_failed: $pull_failed,
                layers: $layers
              }]
              | .total_size_new += $size_new
              | .total_size_old += $size_old
              | if $pull_failed then
                  .have_remote = false
                  | .failed_platforms += [$platform]
                else . end')
            echo "::endgroup::"
          done
          echo "::group::Report final image details"
          docker image ls --tree 2>/dev/null
          echo "::endgroup::"
          echo "$JSON" > "build-details-${RELEASE}.json"
        env:
          RELEASE: ${{matrix.release}}
          REMOTE_IMAGE: ghcr.io/${{github.repository_owner}}/base-ubuntu
          LOCAL_IMAGE_TAG: ${{steps.info.outputs.ci-image-tag}}
          PLATFORMS: ${{steps.info.outputs.platforms}}
      - name: Upload build details
        uses: actions/upload-artifact@v4
        with:
          name: build-details-${{matrix.release}}
          path: build-details-${{matrix.release}}.json
  build-details:
    name: Build Details
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    needs: build-and-test
    steps:
      - name: Download build details
        uses: actions/download-artifact@v4
        with:
          pattern: build-details-*
          merge-multiple: true
      - name: Hide outdated build details comment
        uses: int128/hide-comment-action@v1.53.0
        with:
          starts-with: <!-- build details -->
      - name: Post build details comment
        run: |
          BODY="<!-- build details -->"
          FMT='--to=iec --suffix=B --format=%.2f'
          for FILE in $(ls build-details-*.json | sort); do
            RELEASE=$(jq -r '.release' "$FILE")
            HAVE_REMOTE=$(jq -r '.have_remote' "$FILE")
            TOTAL_SIZE_NEW=$(jq -r '.total_size_new' "$FILE")
            TOTAL_SIZE_OLD=$(jq -r '.total_size_old' "$FILE")
            # Overall size
            OVERALL_SIZE=$(echo "$TOTAL_SIZE_NEW" | numfmt $FMT)
            OVERALL_DIFF=$((TOTAL_SIZE_NEW - TOTAL_SIZE_OLD))
            if (( OVERALL_DIFF > 0 )); then
              OVERALL_SIZE+=" \`+$(echo $OVERALL_DIFF | numfmt $FMT)\`"
            elif (( OVERALL_DIFF < 0 )); then
              OVERALL_SIZE+=" \`$(echo $OVERALL_DIFF | numfmt $FMT)\`"
            fi
            BODY+=$'\n\n'"## Build Details (${RELEASE})"$'\n\n'
            if [[ "$HAVE_REMOTE" != "true" ]]; then
              BODY+=$'> [!WARNING]\n'
              BODY+=$'> Size comparison may be inaccurate.'
              BODY+=$' Failed to pull remote image for the following'
              BODY+=$' platforms:\n'
              while read -r FP; do
                BODY+="> * \`$FP\`"$'\n'
              done < <(jq -r '.failed_platforms[]' "$FILE")
              BODY+=$'\n'
            fi
            BODY+="**Size:** $OVERALL_SIZE"$'\n'
            BODY+=$'\n### Platforms\n\n'
            PLATFORM_COUNT=$(jq '.platforms | length' "$FILE")
            for ((i=0; i<PLATFORM_COUNT; i++)); do
              PLATFORM=$(jq -r ".platforms[$i].name" "$FILE")
              SIZE_NEW=$(jq -r ".platforms[$i].size_new" "$FILE")
              SIZE_OLD=$(jq -r ".platforms[$i].size_old" "$FILE")
              PULL_FAILED=$(jq -r ".platforms[$i].pull_failed" "$FILE")
              LAYERS=$(jq -r ".platforms[$i].layers" "$FILE")
              SIZE=$(echo "$SIZE_NEW" | numfmt $FMT)
              DIFF=$((SIZE_NEW - SIZE_OLD))
              if (( DIFF > 0 )); then
                SIZE+=" \`+$(echo $DIFF | numfmt $FMT)\`"
              elif (( DIFF < 0 )); then
                SIZE+=" \`$(echo $DIFF | numfmt $FMT)\`"
              fi
              if (( DIFF > 0 )); then
                STATUS=":red_square:"
              elif (( DIFF < 0 )); then
                STATUS=":yellow_square:"
              else
                STATUS=":green_square:"
              fi
              BODY+=$'<details>\n'
              BODY+="<summary><code>$PLATFORM</code>"
              BODY+=" $STATUS</summary><br/>"$'\n\n'
              if [[ "$PULL_FAILED" == "true" ]]; then
                BODY+=$'> [!NOTE]\n'
                BODY+=$'> Remote image unavailable.'
                BODY+=$' Size comparison skipped'
                BODY+=$' for this platform.\n\n'
              fi
              BODY+="**Size:** $SIZE"$'\n'
              BODY+=$'\n#### Layers\n\n'
              BODY+=$'| Size | Created By |\n'
              BODY+=$'| ---- | ---------- |\n'
              BODY+="$LAYERS"
              BODY+=$'\n\n</details>\n\n'
            done
          done
          gh pr comment "$PULL_REQUEST_NUMBER" \
            --repo "$GITHUB_REPOSITORY" --body "$BODY"
        env:
          PULL_REQUEST_NUMBER: ${{github.event.pull_request.number}}
          GITHUB_TOKEN: ${{github.token}}
  label:
    name: Label
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Apply labels
        uses: actions/labeler@v6.0.1
