version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '04:00'
      timezone: America/Toronto
    rebase-strategy: auto
    labels:
      - auto
      - dependencies
      - github-actions
    groups:
      docker-actions:
        patterns:
          - docker/*
  - package-ecosystem: docker
    directories:
      - /releases/noble
      - /releases/jammy
      - /releases/focal
    schedule:
      interval: daily
      time: '04:00'
      timezone: America/Toronto
    cooldown:
      default-days: 7
      include:
        - ubuntu:*
    rebase-strategy: auto
    labels:
      - auto
      - dependencies
      - docker
